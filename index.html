<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Offline Activation</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B0C10;
  --bg-2:#101219;
  --panel:rgba(255,255,255,.055);
  --panel-strong:rgba(255,255,255,.09);
  --border:rgba(255,255,255,.09);
  --border-strong:rgba(255,255,255,.16);
  --text:#F5F6FA;
  --text-dim:#9A9CB0;
  --text-faint:#5E6178;
  --violet:#7C5CFC;
  --cyan:#4CD9E8;
  --gold:#FFB020;
  --green:#34D399;
  --red:#FF6B6B;
  --radius-lg:26px;
  --radius-md:18px;
  --radius-sm:12px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
h1,h2,h3,.display{font-family:'Space Grotesk',sans-serif; letter-spacing:-.02em;}
.mono{font-family:'JetBrains Mono',monospace;}
#app{max-width:520px; margin:0 auto; min-height:100vh; position:relative; z-index:1; padding-bottom:calc(84px + var(--safe-bottom));}

/* ---------- animated background blobs ---------- */
#bg-blobs{position:fixed; inset:0; overflow:hidden; z-index:0; pointer-events:none;}
.blob{position:absolute; border-radius:50%; filter:blur(60px); will-change:transform; mix-blend-mode:screen;}
.blob-1{width:46vh; height:46vh; max-width:420px; max-height:420px; top:-8%; left:-12%;
  background:radial-gradient(circle, rgba(124,92,252,.55), rgba(124,92,252,0) 70%);
  animation:blobFloat1 38s ease-in-out infinite;}
.blob-2{width:42vh; height:42vh; max-width:380px; max-height:380px; top:38%; right:-16%;
  background:radial-gradient(circle, rgba(76,217,232,.5), rgba(76,217,232,0) 70%);
  animation:blobFloat2 44s ease-in-out infinite;}
.blob-3{width:40vh; height:40vh; max-width:360px; max-height:360px; bottom:-12%; left:12%;
  background:radial-gradient(circle, rgba(255,138,216,.45), rgba(255,138,216,0) 70%);
  animation:blobFloat3 50s ease-in-out infinite;}
.blob-4{width:34vh; height:34vh; max-width:320px; max-height:320px; bottom:14%; right:6%;
  background:radial-gradient(circle, rgba(92,124,252,.5), rgba(92,124,252,0) 70%);
  animation:blobFloat4 41s ease-in-out infinite;}
@keyframes blobFloat1{
  0%,100%{transform:translate(0,0) scale(1);}
  25%{transform:translate(8vw,10vh) scale(1.12);}
  50%{transform:translate(2vw,18vh) scale(0.94);}
  75%{transform:translate(-6vw,6vh) scale(1.05);}
}
@keyframes blobFloat2{
  0%,100%{transform:translate(0,0) scale(1);}
  30%{transform:translate(-9vw,-6vh) scale(1.08);}
  60%{transform:translate(-3vw,10vh) scale(0.92);}
  85%{transform:translate(4vw,4vh) scale(1.04);}
}
@keyframes blobFloat3{
  0%,100%{transform:translate(0,0) scale(1);}
  20%{transform:translate(7vw,-8vh) scale(0.95);}
  55%{transform:translate(-5vw,-14vh) scale(1.1);}
  80%{transform:translate(3vw,-4vh) scale(1);}
}
@keyframes blobFloat4{
  0%,100%{transform:translate(0,0) scale(1);}
  35%{transform:translate(-6vw,8vh) scale(1.1);}
  65%{transform:translate(5vw,3vh) scale(0.9);}
}
@media (prefers-reduced-motion: reduce){
  .blob{animation:none !important;}
}
::-webkit-scrollbar{display:none;}

/* ---------- glass ---------- */
.glass{
  background:var(--panel);
  backdrop-filter:blur(22px) saturate(160%);
  -webkit-backdrop-filter:blur(22px) saturate(160%);
  border:1px solid var(--border);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.07), inset 0 0 24px rgba(124,92,252,.04), 0 10px 26px rgba(0,0,0,.16);
}
.glass-strong{
  background:var(--panel-strong);
  backdrop-filter:blur(26px) saturate(180%);
  -webkit-backdrop-filter:blur(26px) saturate(180%);
  border:1px solid var(--border-strong);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.09), inset 0 0 30px rgba(124,92,252,.05), 0 12px 30px rgba(0,0,0,.2);
}

/* ---------- top bar ---------- */
.topbar{
  position:sticky; top:0; z-index:40;
  padding:calc(14px + var(--safe-top)) 18px 12px;
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  background:linear-gradient(180deg, rgba(11,12,16,.92), rgba(11,12,16,.55) 70%, transparent);
}
.brand{display:flex; align-items:center; gap:10px;}
.brand-mark{
  width:34px; height:34px; border-radius:10px;
  background:conic-gradient(from 210deg, var(--violet), var(--cyan), var(--violet));
  display:flex; align-items:center; justify-content:center;
  font-family:'Space Grotesk'; font-weight:700; font-size:15px; color:#0B0C10;
  box-shadow:0 4px 18px rgba(124,92,252,.35);
}
.brand-name{font-size:14px; font-weight:600; line-height:1.15; max-width:88px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;}
.brand-name span{overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.brand-name span{display:block; font-size:10.5px; color:var(--text-dim); font-weight:500; letter-spacing:.04em;}
.icon-btn{
  width:38px; height:38px; border-radius:12px; display:flex; align-items:center; justify-content:center;
  border:1px solid var(--border); background:var(--panel); color:var(--text); cursor:pointer;
  transition:transform .15s ease, background .15s ease;
}
.icon-btn:active{transform:scale(.9); background:var(--panel-strong);}
.quickbar{
  display:flex; gap:7px; padding:2px 18px 12px; overflow-x:auto; scroll-snap-type:x proximity;
}
.quick-toggle{
  display:flex; align-items:center; gap:3px; height:32px; padding:0 8px; border-radius:10px;
  border:1px solid var(--border-strong); background:var(--panel-strong); color:var(--text); cursor:pointer;
  font-size:11px; font-weight:700; transition:transform .15s ease; white-space:nowrap; flex:0 0 auto;
}
.quick-toggle:active{transform:scale(.92);}
.quick-toggle svg{width:12px; height:12px; flex:0 0 auto;}
.quick-balance{
  border-color:rgba(255,176,32,.4); background:rgba(255,176,32,.1); color:var(--gold);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.08);
}

/* ---------- screens ---------- */
.screen{display:none; animation:fadeUp .35s cubic-bezier(.2,.8,.2,1);}
.screen.active{display:block;}
@keyframes fadeUp{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);}}

.section{padding:6px 18px 22px;}
.section-head{display:flex; align-items:center; justify-content:space-between; margin:0 0 12px;}
.section-title{font-size:17px; font-weight:600; margin:0;}
.section-link{font-size:12.5px; color:var(--cyan); font-weight:600; cursor:pointer;}

/* ---------- search ---------- */
.search-wrap{padding:0 18px 12px;}
.search-bar{
  display:flex; align-items:center; gap:8px; padding:0 12px; height:36px;
  border-radius:11px; background:rgba(255,255,255,.05); border:1px solid var(--border);
}
.search-bar svg{width:15px; height:15px; flex:0 0 auto; opacity:.55;}
.search-bar input{
  flex:1; min-width:0; background:none; border:none; outline:none; color:var(--text); font-size:13px; font-family:'Inter';
}
.search-bar input::placeholder{color:var(--text-faint);}

/* ---------- banner ---------- */
.hero{
  margin:0 18px 20px; border-radius:var(--radius-lg); padding:22px;
  position:relative; overflow:hidden; min-height:150px;
  background:linear-gradient(135deg, rgba(124,92,252,.35), rgba(76,217,232,.18));
  border:1px solid var(--border-strong);
}
.hero::after{
  content:''; position:absolute; inset:0;
  background:radial-gradient(220px 220px at 90% 10%, rgba(255,255,255,.18), transparent 60%);
}
.hero-tag{
  display:inline-block; font-size:10.5px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  padding:5px 10px; border-radius:20px; background:rgba(11,12,16,.4); border:1px solid rgba(255,255,255,.2);
  margin-bottom:10px;
}
.hero h2{font-size:22px; margin:0 0 6px; position:relative; z-index:1;}
.hero p{font-size:12.5px; color:rgba(245,246,250,.85); margin:0 0 16px; max-width:78%; position:relative;}
.hero-btn{
  display:inline-flex; align-items:center; gap:6px; background:#F5F6FA; color:#0B0C10; border:none;
  padding:10px 16px; border-radius:999px; font-weight:700; font-size:12.5px; cursor:pointer; position:relative;
}

/* ---------- categories chips ---------- */
.chip-row{display:flex; gap:9px; overflow-x:auto; padding:0 18px 4px; scroll-snap-type:x proximity;}
.chip{
  flex:0 0 auto; padding:9px 15px; border-radius:999px; font-size:12.5px; font-weight:600; color:var(--text-dim);
  cursor:pointer; transition:all .15s ease; white-space:nowrap; scroll-snap-align:start;
}
.chip.active{color:#0B0C10; background:linear-gradient(135deg,var(--violet),var(--cyan)); border-color:transparent;}

/* ---------- game card grid ---------- */
.grid{display:grid; grid-template-columns:repeat(2,1fr); gap:13px; padding:0 18px;}
.rail{display:flex; gap:13px; overflow-x:auto; padding:2px 18px 10px;}
.rail .card{flex:0 0 148px;}

.card{
  border-radius:var(--radius-md); overflow:hidden; cursor:pointer;
  transition:transform .32s cubic-bezier(.22,.85,.32,1.15), box-shadow .32s ease;
  position:relative;
}
.card:active{
  transform:translateY(-3px) scale(1.03);
  box-shadow:0 16px 34px rgba(124,92,252,.32), 0 4px 14px rgba(0,0,0,.25);
}
@media (hover:hover){
  .card:hover{
    transform:translateY(-3px) scale(1.03);
    box-shadow:0 16px 34px rgba(124,92,252,.28), 0 4px 14px rgba(0,0,0,.22);
  }
}
.cover{
  position:relative; aspect-ratio:3/4; border-radius:var(--radius-md); overflow:hidden;
  display:flex; align-items:flex-end; padding:10px;
}
.cover::before{content:''; position:absolute; inset:0; background:linear-gradient(180deg, transparent 40%, rgba(0,0,0,.55) 100%);}
.cover-title{position:relative; z-index:1; font-family:'Space Grotesk'; font-weight:600; font-size:12.5px; line-height:1.2; color:#fff; text-shadow:0 2px 8px rgba(0,0,0,.4);}
.seal{
  position:absolute; top:8px; right:8px; width:22px; height:22px; border-radius:50%; z-index:2;
  background:conic-gradient(from var(--seal-a,0deg), #ff9ad5, #7C5CFC, #4CD9E8, #ffe27a, #ff9ad5);
  box-shadow:0 0 0 2px rgba(255,255,255,.35) inset, 0 2px 6px rgba(0,0,0,.4);
}
.badge{
  position:absolute; top:8px; left:8px; z-index:2; font-size:9.5px; font-weight:700; letter-spacing:.03em;
  padding:3px 7px; border-radius:6px; text-transform:uppercase;
}
.badge.sale{background:var(--gold); color:#211500;}
.badge.new{background:var(--cyan); color:#012027;}
.badge.hot{background:var(--violet); color:#fff;}
.meta{padding:9px 3px 2px;}
.meta .g-title{font-size:12.5px; font-weight:600; margin:0 0 3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.meta .g-genre{font-size:10.5px; color:var(--text-faint); margin:0 0 6px;}
.price-row{display:flex; align-items:center; gap:6px;}
.price{font-family:'JetBrains Mono'; font-weight:600; font-size:13px; color:var(--text);}
.price.sale{color:var(--gold);}
.price-old{font-family:'JetBrains Mono'; font-size:10.5px; color:var(--text-faint); text-decoration:line-through;}
.stars{font-size:10px; color:var(--gold); display:flex; align-items:center; gap:3px; margin-left:auto;}

/* ---------- bottom nav ---------- */
.tabbar{
  position:fixed; left:0; right:0; bottom:0; z-index:50; max-width:520px; margin:0 auto;
  padding:10px 18px calc(10px + var(--safe-bottom));
  display:flex; justify-content:space-around; align-items:center;
  background:rgba(15,16,22,.52); backdrop-filter:blur(34px) saturate(200%); -webkit-backdrop-filter:blur(34px) saturate(200%);
  border-top:1px solid rgba(255,255,255,.08);
  box-shadow:0 -8px 30px rgba(0,0,0,.22);
}
.tab{display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--text-faint); cursor:pointer; position:relative; padding:6px 14px; overflow:visible; transition:color .2s ease;}
.tab.active{color:var(--text);}
.tab svg{width:22px; height:22px; position:relative; z-index:1;}
.tab span{font-size:9.5px; font-weight:600; position:relative; z-index:1;}
.tab .dot{position:absolute; top:2px; right:6px; width:7px; height:7px; border-radius:50%; background:var(--gold); border:1.5px solid var(--bg); z-index:2;}
.tab-bubble{
  position:absolute; top:0; left:50%; width:42px; height:42px; border-radius:50%; z-index:0;
  background:radial-gradient(circle, rgba(124,92,252,.38), rgba(76,217,232,.16) 60%, transparent 78%);
  transform:translateX(-50%) scale(.4); opacity:0;
  animation:bubblePop .45s cubic-bezier(.22,1.4,.4,1) forwards;
}
@keyframes bubblePop{
  0%{transform:translateX(-50%) scale(.4); opacity:0;}
  55%{transform:translateX(-50%) scale(1.1); opacity:1;}
  100%{transform:translateX(-50%) scale(1); opacity:.9;}
}
.tab-ripple{
  position:absolute; border-radius:50%; z-index:0; pointer-events:none;
  background:radial-gradient(circle, rgba(124,92,252,.45), transparent 70%);
  transform:translate(-50%,-50%) scale(0); opacity:.7;
  animation:rippleOut .55s ease-out forwards;
}
@keyframes rippleOut{
  to{ transform:translate(-50%,-50%) scale(2.8); opacity:0; }
}

.tab-pay{ padding:0 6px; margin-top:-24px; justify-content:flex-start; cursor:pointer; }
.pay-btn{
  width:56px; height:56px; border-radius:50%;
  background:linear-gradient(135deg, var(--violet), #4C6FFC 65%, var(--cyan));
  display:flex; align-items:center; justify-content:center;
  color:#fff; font-family:'Space Grotesk'; font-weight:700; font-size:11.5px; letter-spacing:.06em;
  border:1px solid rgba(255,255,255,.22);
  box-shadow:0 0 0 6px rgba(9,10,14,.65), 0 8px 20px rgba(124,92,252,.4), 0 0 20px rgba(124,92,252,.35);
  transition:transform .18s cubic-bezier(.2,.8,.2,1);
  animation:payBreathe 3.8s ease-in-out infinite, payGlow 3.8s ease-in-out infinite;
}
.tab-pay:active .pay-btn{ transform:scale(.86); animation-play-state:paused; }
@keyframes payBreathe{
  0%,100%{ transform:scale(1); }
  50%{ transform:scale(1.05); }
}
@keyframes payGlow{
  0%,100%{ box-shadow:0 0 0 6px rgba(9,10,14,.65), 0 8px 20px rgba(124,92,252,.35), 0 0 16px rgba(124,92,252,.3); }
  50%{ box-shadow:0 0 0 6px rgba(9,10,14,.65), 0 10px 28px rgba(124,92,252,.6), 0 0 34px rgba(124,92,252,.55); }
}
@media (prefers-reduced-motion: reduce){
  .pay-btn{ animation:none !important; }
}

/* ---------- buttons ---------- */
.btn{
  border:none; border-radius:14px; padding:14px 18px; font-weight:700; font-size:14px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:8px; transition:transform .15s ease, opacity .15s ease; width:100%;
}
.btn:active{transform:scale(.97);}
.btn-primary{background:linear-gradient(135deg,var(--violet),#5a3fe0); color:#fff; box-shadow:0 8px 24px rgba(124,92,252,.3);}
.btn-ghost{background:var(--panel); border:1px solid var(--border); color:var(--text);}
.btn-light{background:#F5F6FA; color:#0B0C10;}
.btn-danger{background:rgba(255,107,107,.12); color:var(--red); border:1px solid rgba(255,107,107,.3);}
.btn-sm{padding:9px 14px; font-size:12.5px; border-radius:11px; width:auto;}
.btn:disabled{opacity:.5;}

/* ---------- detail screen ---------- */
.detail-cover{
  margin:0 18px; border-radius:var(--radius-lg); aspect-ratio:16/10; position:relative; overflow:hidden;
  display:flex; align-items:flex-end; padding:20px; border:1px solid var(--border-strong);
}
.detail-cover::before{content:''; position:absolute; inset:0; background:linear-gradient(180deg, transparent 20%, rgba(0,0,0,.6) 100%);}
.detail-cover h1{position:relative; z-index:1; font-size:24px; margin:0 0 4px; color:#fff;}
.pill-row{display:flex; gap:8px; flex-wrap:wrap; padding:16px 18px 4px;}
.pill{font-size:11px; font-weight:600; padding:6px 11px; border-radius:999px; color:var(--text-dim);}
.desc{padding:14px 18px; font-size:13.5px; line-height:1.65; color:var(--text-dim);}
.stat-row{display:flex; gap:10px; padding:4px 18px 6px;}
.stat-box{flex:1; border-radius:var(--radius-sm); padding:12px; text-align:center;}
.stat-box b{display:block; font-size:16px; font-family:'Space Grotesk';}
.stat-box span{font-size:9.5px; color:var(--text-faint); text-transform:uppercase; letter-spacing:.04em;}
.sticky-buy{
  position:sticky; bottom:0; padding:14px 18px calc(14px + var(--safe-bottom)); display:flex; gap:10px;
  background:linear-gradient(180deg, transparent, rgba(11,12,16,.9) 30%);
  margin-top:10px;
}

/* ---------- lists ---------- */
.list-row{
  display:flex; align-items:center; gap:12px; padding:13px 14px; border-radius:var(--radius-md); margin-bottom:10px; cursor:pointer;
}
.list-row .thumb{width:46px; height:46px; border-radius:11px; flex:0 0 auto; display:flex; align-items:center; justify-content:center; font-family:'Space Grotesk'; font-weight:700; font-size:13px;}
.list-row .info{flex:1; min-width:0;}
.list-row .info b{display:block; font-size:13.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.list-row .info span{font-size:11.5px; color:var(--text-faint);}
.qty-ctrl{display:flex; align-items:center; gap:8px;}
.qty-ctrl button{width:26px; height:26px; border-radius:8px; border:1px solid var(--border); background:var(--panel); color:var(--text); font-size:14px; cursor:pointer;}

/* ---------- profile ---------- */
.profile-head{display:flex; align-items:center; gap:14px; padding:6px 18px 18px;}
.avatar{width:64px; height:64px; border-radius:20px; background:conic-gradient(from 140deg,var(--violet),var(--cyan)); display:flex; align-items:center; justify-content:center; font-family:'Space Grotesk'; font-weight:700; font-size:22px; color:#0B0C10;}
.profile-name{font-size:17px; font-weight:600; margin:0 0 3px;}
.profile-sub{font-size:12px; color:var(--text-faint);}
.ref-card{margin:0 18px 18px; border-radius:var(--radius-lg); padding:18px; background:linear-gradient(135deg, rgba(124,92,252,.28), rgba(76,217,232,.16)); border:1px solid var(--border-strong); cursor:pointer; transition:transform .15s ease;}
.ref-card:active{transform:scale(.98);}
.menu-row{display:flex; align-items:center; gap:12px; padding:14px 16px; border-radius:var(--radius-md); margin-bottom:9px; cursor:pointer;}
.menu-row .ic{width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center; background:var(--panel-strong);}
.menu-row b{font-size:13.5px; font-weight:600; flex:1;}
.menu-row .chev{color:var(--text-faint);}

/* ---------- toast ---------- */
.toast{
  position:fixed; left:50%; bottom:100px; transform:translateX(-50%) translateY(20px); z-index:100;
  padding:12px 18px; border-radius:14px; font-size:13px; font-weight:600; display:flex; align-items:center; gap:8px;
  opacity:0; transition:all .3s cubic-bezier(.2,.8,.2,1); pointer-events:none; max-width:88%;
  background:rgba(20,22,30,.92); backdrop-filter:blur(20px); border:1px solid var(--border-strong);
}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

/* ---------- modal / sheet ---------- */
.overlay{position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:80; opacity:0; pointer-events:none; transition:opacity .25s ease;}
.overlay.show{opacity:1; pointer-events:auto;}
.sheet{
  position:fixed; left:0; right:0; bottom:0; z-index:90; max-width:520px; margin:0 auto;
  background:#14151c; border-radius:26px 26px 0 0; border:1px solid var(--border-strong); border-bottom:none;
  padding:20px 18px calc(22px + var(--safe-bottom)); transform:translateY(100%); transition:transform .32s cubic-bezier(.2,.8,.2,1);
  max-height:82vh; overflow-y:auto;
}
.sheet.show{transform:translateY(0);}
.sheet-handle{width:38px; height:4px; border-radius:3px; background:var(--border-strong); margin:0 auto 16px;}

/* ---------- checkout / loading ---------- */
.center-screen{display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:60px 30px; min-height:70vh; position:relative;}
.spinner{width:56px; height:56px; border-radius:50%; border:3px solid var(--border); border-top-color:var(--violet); animation:spin 1s linear infinite; margin-bottom:22px;}
@keyframes spin{to{transform:rotate(360deg);}}

.success-screen{position:relative; overflow:hidden;}
.success-screen::after{
  content:''; position:fixed; inset:0; z-index:-1; pointer-events:none;
  background:radial-gradient(circle at 50% 28%, transparent 0%, rgba(0,0,0,.4) 100%);
  opacity:0; animation:dimIn 1s ease forwards;
}
@keyframes dimIn{ to{ opacity:1; } }
.success-glow{
  position:absolute; top:18%; left:50%; width:280px; height:280px; transform:translateX(-50%);
  background:radial-gradient(circle, rgba(124,92,252,.35), rgba(76,217,232,.12) 55%, transparent 75%);
  filter:blur(30px); border-radius:50%; z-index:0;
  animation:glowIn 1.4s ease forwards;
  opacity:0;
}
@keyframes glowIn{ 0%{opacity:0; transform:translateX(-50%) scale(.7);} 100%{opacity:1; transform:translateX(-50%) scale(1);} }
.success-particles{position:absolute; inset:0; z-index:0; pointer-events:none;}
.spark{
  position:absolute; bottom:32%; left:var(--sx); font-size:var(--ssize); opacity:0;
  animation:sparkFloat 1.8s ease-out forwards;
  animation-delay:var(--sdelay);
  filter:drop-shadow(0 0 6px rgba(255,209,102,.7));
}
@keyframes sparkFloat{
  0%{opacity:0; transform:translateY(0) scale(.4) rotate(0deg);}
  15%{opacity:1;}
  100%{opacity:0; transform:translateY(-160px) scale(1) rotate(30deg);}
}
.check-circle{
  width:78px; height:78px; border-radius:50%; background:linear-gradient(135deg,var(--green),#1fae7a); display:flex; align-items:center;
  justify-content:center; margin-bottom:20px; box-shadow:0 10px 30px rgba(52,211,153,.35); position:relative; z-index:1;
  opacity:0; animation:pop .55s cubic-bezier(.2,1.4,.4,1) .5s forwards;
}
@keyframes pop{0%{transform:scale(0); opacity:0;} 70%{transform:scale(1.1);} 100%{transform:scale(1); opacity:1;}}
.fade-up-in{opacity:0; transform:translateY(10px); animation:fadeUpIn .5s cubic-bezier(.2,.8,.2,1) forwards; position:relative; z-index:1;}
@keyframes fadeUpIn{ to{ opacity:1; transform:translateY(0); } }

/* =========================================================================
   OFFLINE ACTIVATION — Telegram Mini App prototype
   Single-file, framework-free implementation. In-memory state only
   (no localStorage — not available in this sandbox; a real deployment
   would persist via the backend described in ARCHITECTURE NOTES below).

   ARCHITECTURE NOTES (for future backend integration)
   -----------------------------------------------------------------------
   - api.* functions below are the ONLY place that "talk" to a backend.
     Right now they resolve instantly with mock data. Swap their internals
     for real fetch() calls to your server and nothing else in the app
     needs to change.
   - auth.telegramLogin() reads Telegram.WebApp.initDataUnsafe when running
     inside Telegram, and falls back to a mock user otherwise. On a real
     server you'd send window.Telegram.WebApp.initData to your backend and
     verify the hash server-side (per Telegram Mini Apps docs) instead of
     trusting initDataUnsafe on the client.
   - payments.pay() is a stub. To wire up Telegram Stars: call
     Telegram.WebApp.openInvoice(invoiceUrl) with an invoice link created
     server-side via the Bot API `createInvoiceLink` (currency "XTR" for
     Stars), then listen to the invoiceClosed event. To support another
     provider, add a new function with the same (order) -> Promise<result>
     signature and swap it in CONFIG.paymentProvider.
   ========================================================================= */

const CONFIG = {
  storeName: "Offline Activation",
  botUsername: "offline_activation_bot",   // placeholder
  // Real vs. simulated payments are now auto-detected at runtime (see
  // isRealPaymentsAvailable() below) — this flag is just informational.
  paymentProvider: "mock",                  // "mock" | "telegram_stars" | "other"
  // Point this at your deployed backend (see /backend/README.md for how to
  // build + deploy it). Real Telegram Stars payments stay OFF until this is
  // changed from the placeholder below AND the app is opened inside real Telegram.
  apiBaseUrl: "https://api.offlineactivation.example/v1", // placeholder — replace after deploying /backend
  // Only these two Telegram accounts can see and use the Admin panel.
  // Usernames are matched case-insensitively, without the "@".
  // NOTE: Telegram usernames can be changed by their owner at any time, and
  // Telegram only includes the username in initDataUnsafe if the person has
  // one set — so for a real production launch, switch to numeric Telegram
  // user IDs instead (ask @userinfobot for yours) via adminTelegramIds below,
  // and verify them server-side. Both lists are checked; either match grants access.
  adminUsernames: ["RutuGames", "RutuLljko"],
  adminTelegramIds: [],
  referralRewardUsd: 2, // flat reward per successful referral, shown converted in the active currency
  supportTelegramUsername: "RutuGames", // where "Message support" sends people
};
function isAdmin(u){
  if (!u) return false;
  const uname = (u.username||"").replace(/^@/,"").toLowerCase();
  const allowed = CONFIG.adminUsernames.map(x=>x.toLowerCase());
  return allowed.includes(uname) || CONFIG.adminTelegramIds.includes(u.id);
}
function openTelegramLink(username){
  const url = `https://t.me/${username.replace(/^@/,"")}`;
  try{
    const tg = window.Telegram && window.Telegram.WebApp;
    if (tg && tg.openTelegramLink) { tg.openTelegramLink(url); return; }
  }catch(e){}
  window.open(url, "_blank");
}
// True only when: running inside real Telegram (openInvoice + initData exist)
// AND apiBaseUrl has been pointed at a real deployed backend (not the placeholder).
// See backend/README.md for how to deploy the backend and fill this in.
function isRealPaymentsAvailable(){
  try{
    const tg = window.Telegram && window.Telegram.WebApp;
    const backendConfigured = CONFIG.apiBaseUrl && !CONFIG.apiBaseUrl.includes("api.offlineactivation.example");
    return !!(tg && typeof tg.openInvoice === "function" && tg.initData && backendConfigured);
  }catch(e){ return false; }
}

/* ---------------- mock backend layer ---------------- */
const api = {
  async fetchCatalog(){ return GAMES; },
  async fetchUser(){ return STATE.user; },
  async placeOrder(order){ await wait(1400); return { ok:true, orderId: "OA-" + Math.floor(100000+Math.random()*900000) }; },
};
const payments = {
  async pay(order){
    // order: { items: [{id, title, qty, price}], total }
    if (isRealPaymentsAvailable()) {
      const tg = window.Telegram.WebApp;
      try{
        const res = await fetch(`${CONFIG.apiBaseUrl}/api/create-invoice`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            initData: tg.initData,
            items: order.items.map(i => ({ id: i.id, qty: i.qty })),
          }),
        });
        if (!res.ok) {
          const errBody = await res.json().catch(()=>({}));
          throw new Error(errBody.error || `Server error (${res.status})`);
        }
        const { orderId, invoiceLink } = await res.json();
        const status = await new Promise(resolve => tg.openInvoice(invoiceLink, resolve));
        // status is one of: "paid" | "cancelled" | "failed" | "pending"
        return { ok: status === "paid", orderId, status, real: true };
      }catch(err){
        console.error("Real payment failed:", err);
        return { ok:false, error: err.message, real:true };
      }
    }
    // ---- Fallback: simulated payment for local preview / testing outside Telegram ----
    await wait(1600);
    return { ok:true, real:false };
  }
};
function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }

/* ---------------- telegram auth ---------------- */

  telegramLogin(){
    try{
      const tg = window.Telegram && window.Telegram.WebApp;
      if (tg) {
        tg.ready(); tg.expand();
        const u = tg.initDataUnsafe && tg.initDataUnsafe.user;
        if (u) {
          return {
            id: u.id, firstName: u.first_name, lastName: u.last_name || "",
            username: u.username ? "@"+u.username : "", photoUrl: u.photo_url || null,
          };
        }
      }
    }catch(e){}
    // fallback mock user (dev / browser preview) — set to an admin account so the
    // Admin panel is reachable while testing outside of real Telegram. Real visitors
    // opening this as an actual Telegram Mini App will get their own Telegram identity above.
    return { id: 700104512, firstName:"Rutu", lastName:"Games", username:"@RutuGames", photoUrl:null };
  }
};

const $ = sel => document.querySelector(sel);
const app = $("#app");
function money(usd){
  const cur = STATE.currency;
  if (cur==="EUR") return "€"+(usd*RATES.EUR).toFixed(2);
  if (cur==="RUB") return Math.round(usd*RATES.RUB).toLocaleString("ru-RU")+" ₽";
  if (cur==="STARS") return Math.round(usd*RATES.STARS)+" ⭐";
  return "$"+usd.toFixed(2);
}
function initials(t){ return t.split(" ").filter(w=>w.length>1||/[A-Za-z]/.test(w)).slice(0,2).map(w=>w[0]).join("").toUpperCase(); }
function coverStyle(g){
  if (g.imageUrl) return `background-image:url('${g.imageUrl.replace(/'/g,"%27")}'); background-size:cover; background-position:center;`;
  return `background:linear-gradient(150deg,hsl(${g.hue} 70% 22%),hsl(${g.hue2} 65% 14%));`;
}
function starIcon(){ return `<svg width="10" height="10" viewBox="0 0 20 20" fill="currentColor"><path d="M10 1l2.6 6.2 6.7.5-5.1 4.4 1.6 6.5L10 15.2 4.2 18.6l1.6-6.5L.7 7.7l6.7-.5z"/></svg>`; }
function cartCount(){ return Object.values(STATE.cart).reduce((a,b)=>a+b,0); }
function cartTotal(){
  let t=0; for(const id in STATE.cart){ const g=GAMES.find(x=>x.id===id); t += g.price*STATE.cart[id]; }
  return t;
}
function toast(msg){
  const t=$("#toast"); t.innerHTML = msg; t.classList.add("show");
  clearTimeout(toast._t); toast._t = setTimeout(()=>t.classList.remove("show"), 2200);
}
function openSheet(html){
  $("#sheet").innerHTML = `<div class="sheet-handle"></div>` + html;
  $("#overlay").classList.add("show"); $("#sheet").classList.add("show");
}
function closeSheet(){ $("#overlay").classList.remove("show"); $("#sheet").classList.remove("show"); }
$("#overlay").addEventListener("click", closeSheet);

function go(screen, params){
  STATE.screen = screen;
  if(params) Object.assign(STATE, params);
  render();
  window.scrollTo(0,0);
}

/* ============================= RENDER: SHELL ============================= */
function render(){
  app.innerHTML = `
    ${STATE.screen!=="checkout-loading" && STATE.screen!=="checkout-success" ? topbar() : ""}
    <div class="screen active">${renderScreen()}</div>
    ${showTabbar() ? tabbar() : ""}
  `;
  bindEvents();
}
function showTabbar(){ return !["detail","checkout-loading","checkout-success","admin"].includes(STATE.screen); }

function topbar(){
  if (STATE.screen==="detail") return `
    <div class="topbar">
      <div class="icon-btn" data-nav="back">${ICO.back}</div>
      <div class="icon-btn" data-toggle-fav="${STATE.detailId}">${STATE.favorites.has(STATE.detailId)?ICO.heartFill:ICO.heart}</div>
    </div>`;
  if (STATE.screen==="admin" || STATE.screen==="checkout-loading" || STATE.screen==="checkout-success") return "";
  const langLabel = { en:"EN", ru:"RU", zh:"中文" }[STATE.lang] || "EN";
  const curLabel = { STARS:"⭐ XTR", USD:"$ USD", EUR:"€ EUR", RUB:"₽ RUB" }[STATE.currency] || "⭐ XTR";
  return `
    <div class="topbar">
      <div class="brand">
        <div class="brand-mark">OA</div>
        <div class="brand-name">${CONFIG.storeName}<span>${t('store_sub')}</span></div>
      </div>
      <div class="icon-btn" data-nav="notifications">${ICO.bell}</div>
    </div>
    <div class="quickbar">
      <div class="quick-toggle quick-balance" data-nav="settings" title="${t('stars_balance')}">⭐ ${STATE.starsBalance.toLocaleString('en-US')}</div>
      <div class="quick-toggle" data-cyclecurrency title="${t('settings_currency')}">${curLabel}</div>
      <div class="quick-toggle" data-cyclelang title="${t('settings_language')}">${ICO.globe}${langLabel}</div>
    </div>`;
}

function tabbar(){
  const leftTabs = [
    {id:"home", ic:ICO.home, label:t('tab_home')},
    {id:"catalog", ic:ICO.grid, label:t('tab_catalog')},
  ];
  const rightTabs = [
    {id:"cart", ic:ICO.cart, label:t('tab_cart'), badge:cartCount()},
    {id:"profile", ic:ICO.user, label:t('tab_profile')},
  ];
  const renderTab = tb => `
    <div class="tab ${STATE.screen===tb.id?'active':''}" data-nav="${tb.id}" data-tab="${tb.id}">
      ${STATE.screen===tb.id?'<div class="tab-bubble"></div>':''}
      ${tb.ic}
      <span>${tb.label}</span>
      ${tb.badge?`<div class="dot"></div>`:""}
    </div>`;
  const payBtn = `
    <div class="tab tab-pay" data-pay-btn data-tab="pay" title="${t('tab_pay')}">
      <div class="pay-btn">PAY</div>
    </div>`;
  return `<div class="tabbar">
    ${leftTabs.map(renderTab).join("")}
    ${payBtn}
    ${rightTabs.map(renderTab).join("")}
  </div>`;
}

function renderScreen(){
  switch(STATE.screen){
    case "home": return screenHome();
    case "catalog": return screenCatalog();
    case "detail": return screenDetail();
    case "cart": return screenCart();
    case "checkout-loading": return screenCheckoutLoading();
    case "checkout-success": return screenCheckoutSuccess();
    case "profile": return screenProfile();
    case "orders": return screenOrders();
    case "favorites": return screenFavorites();
    case "settings": return screenSettings();
    case "support": return screenSupport();
    case "referral": return screenReferral();
    case "notifications": return screenNotifications();
    case "admin": return screenAdmin();
    default: return screenHome();
  }
}

function screenCheckoutSuccess(){
  const order = STATE.orders[0];
  const sparkGlyphs = ["⭐","✦","✧","✨"];
  let sparks = "";
  for(let i=0;i<10;i++){
    const sx = 30 + Math.random()*40; // 30%-70% horizontal spread
    const size = 12 + Math.random()*10;
    const delay = (Math.random()*0.9).toFixed(2);
    const glyph = sparkGlyphs[i % sparkGlyphs.length];
    sparks += `<span class="spark" style="--sx:${sx}%; --ssize:${size}px; --sdelay:${delay}s;">${glyph}</span>`;
  }
  return `<div class="center-screen success-screen">
    <div class="success-glow"></div>
    <div class="success-particles">${sparks}</div>
    <div class="check-circle"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#0B2A1D" stroke-width="3"><path d="M4 12l6 6L20 6"/></svg></div>
    <h2 class="fade-up-in" style="margin:0 0 8px; animation-delay:1s;">${t('purchase_complete')}</h2>
    <p class="fade-up-in" style="color:var(--text-dim); font-size:13.5px; max-width:280px; margin-bottom:26px; animation-delay:1.15s;">${t('order_label')} <span class="mono">${order?order.id:''}</span> ${t('order_confirmed')}</p>
    <div class="fade-up-in" style="width:100%; display:flex; flex-direction:column; gap:10px; animation-delay:1.4s;">
      <button class="btn btn-light" data-nav="orders">${t('view_order')}</button>
      <button class="btn btn-ghost" data-nav="home">${t('continue_shopping')}</button>
    </div>
  </div>`;
}

/* ============================= EVENTS ============================= */
const LANG_CYCLE = ["en","ru","zh"];
const CURRENCY_CYCLE = ["STARS","USD","EUR","RUB"];

function bindEvents(){
  app.querySelectorAll("[data-nav]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const target = el.dataset.nav;
      if (target==="back") { go(STATE.screen==="detail" ? (STATE.prevScreen||"home") : "home"); return; }
      go(target);
    });
  });
  // central PAY button: opens the "Top up balance" sheet
  app.querySelectorAll("[data-pay-btn]").forEach(el=>{
    el.addEventListener("click", openTopUpSheet);
  });
  // Telegram-style tap "bubble" ripple on bottom tab bar icons
  app.querySelectorAll("[data-tab]").forEach(el=>{
    el.addEventListener("pointerdown", (e)=>{
      const rect = el.getBoundingClientRect();
      const ripple = document.createElement("div");
      ripple.className = "tab-ripple";
      const size = Math.max(rect.width, rect.height) * 1.1;
      ripple.style.width = size+"px";
      ripple.style.height = size+"px";
      ripple.style.left = ((e.clientX ?? rect.left+rect.width/2) - rect.left)+"px";
      ripple.style.top = ((e.clientY ?? rect.top+rect.height/2) - rect.top)+"px";
      el.appendChild(ripple);
      ripple.addEventListener("animationend", ()=> ripple.remove());
    });
  });
  app.querySelectorAll("[data-open]").forEach(el=>{
    el.addEventListener("click", ()=>{ STATE.prevScreen = STATE.screen; go("detail", {detailId: el.dataset.open}); });
  });
  app.querySelectorAll("[data-genre]").forEach(el=>{
    el.addEventListener("click", ()=>{ STATE.activeGenre = el.dataset.genre; go("catalog"); });
  });
  app.querySelectorAll("[data-fav]").forEach(el=>{
    el.addEventListener("click", (e)=>{ e.stopPropagation(); toggleFav(el.dataset.fav); });
  });
  app.querySelectorAll("[data-toggle-fav]").forEach(el=>{
    el.addEventListener("click", ()=>{ toggleFav(el.dataset.toggleFav); render(); });
  });
  app.querySelectorAll("[data-add]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const id = el.dataset.add;
      STATE.cart[id] = (STATE.cart[id]||0)+1;
      toast(t('toast_added'));
      render();
    });
  });
  app.querySelectorAll("[data-qty]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const [id, d] = el.dataset.qty.split(":");
      STATE.cart[id] = (STATE.cart[id]||0) + parseInt(d);
      if (STATE.cart[id]<=0) delete STATE.cart[id];
      render();
    });
  });

  // --- working live search: filters as you type, jumps to Catalog automatically ---
  const searchInput = $("#searchInput");
  if (searchInput) {
    // restore focus + caret after a debounce-triggered re-render
    if (document.activeElement !== searchInput && STATE._focusSearch) {
      searchInput.focus();
      try{ searchInput.setSelectionRange(STATE._searchCaret||searchInput.value.length, STATE._searchCaret||searchInput.value.length); }catch(e){}
      STATE._focusSearch = false;
    }
    searchInput.addEventListener("input", e=>{
      STATE.search = e.target.value;
      STATE._searchCaret = e.target.selectionStart;
      clearTimeout(bindEvents._searchTimer);
      bindEvents._searchTimer = setTimeout(()=>{
        STATE._focusSearch = true;
        if (STATE.screen !== "catalog") STATE.screen = "catalog";
        render();
      }, 180);
    });
    searchInput.addEventListener("keyup", e=>{
      if(e.key==="Enter"){ STATE.search = e.target.value; STATE._focusSearch=false; go("catalog"); }
    });
  }

  const checkoutBtn = $("#checkoutBtn");
  if (checkoutBtn) checkoutBtn.addEventListener("click", doCheckout);

  // quick toggles: language & currency (topbar pills, visible everywhere)
  app.querySelectorAll("[data-cyclelang]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const i = LANG_CYCLE.indexOf(STATE.lang);
      STATE.lang = LANG_CYCLE[(i+1) % LANG_CYCLE.length];
      render();
    });
  });
  app.querySelectorAll("[data-cyclecurrency]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const i = CURRENCY_CYCLE.indexOf(STATE.currency);
      STATE.currency = CURRENCY_CYCLE[(i+1) % CURRENCY_CYCLE.length];
      render();
    });
  });
  // settings screen: explicit language & currency pickers
  app.querySelectorAll("[data-setlang]").forEach(el=>{
    el.addEventListener("click", ()=>{ STATE.lang = el.dataset.setlang; render(); });
  });
  app.querySelectorAll("[data-setcurrency]").forEach(el=>{
    el.addEventListener("click", ()=>{ STATE.currency = el.dataset.setcurrency; render(); });
  });
  // referral: copy link
  const copyRefBtn = $("#copyRefBtn");
  if (copyRefBtn) copyRefBtn.addEventListener("click", ()=>{
    const link = copyRefBtn.dataset.link;
    try{
      navigator.clipboard.writeText(link);
    }catch(e){}
    toast(t('toast_ref_copied'));
  });
  // support: open real Telegram chat with the store's support account
  app.querySelectorAll("[data-support-link]").forEach(el=>{
    el.addEventListener("click", ()=> openTelegramLink(CONFIG.supportTelegramUsername));
  });

  // admin
  app.querySelectorAll("[data-admintab]").forEach(el=>{
    el.addEventListener("click", ()=>{ STATE.adminTab = el.dataset.admintab; render(); });
  });
  app.querySelectorAll("[data-delgame]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const idx = GAMES.findIndex(g=>g.id===el.dataset.delgame);
      if(idx>-1){ GAMES.splice(idx,1); toast(t('toast_game_removed')); render(); }
    });
  });
  app.querySelectorAll("[data-priceedit]").forEach(el=>{
    el.addEventListener("change", ()=>{
      const g = GAMES.find(x=>x.id===el.dataset.priceedit);
      const v = parseFloat(el.value); if(!isNaN(v) && v>0) g.price = v;
      toast(t('toast_price_updated'));
    });
  });
  app.querySelectorAll("[data-editgame]").forEach(el=>{
    el.addEventListener("click", ()=> openEditGameSheet(el.dataset.editgame));
  });
  const addGameBtn = $("#addGameBtn");
  if(addGameBtn) addGameBtn.addEventListener("click", ()=> openEditGameSheet(null));
}

function toggleFav(id){
  if (STATE.favorites.has(id)) STATE.favorites.delete(id); else STATE.favorites.add(id);
}

async function doCheckout(){
  if(!Object.keys(STATE.cart).length) return;
  go("checkout-loading");
  const items = Object.keys(STATE.cart).map(id=>{
    const g = GAMES.find(x=>x.id===id);
    return {id:g.id, title:g.title, qty:STATE.cart[id], price:g.price};
  });
  const total = cartTotal();
  const res = await payments.pay({items, total});
  if(res.ok){
    let orderId = res.orderId;
    if (!orderId) {
      const placed = await api.placeOrder({items, total});
      orderId = placed.orderId;
    }
    STATE.orders.unshift({id:orderId, items, total, date:new Date().toISOString()});
    STATE.cart = {};
    go("checkout-success");
  } else if (res.status === "cancelled") {
    // user closed the Telegram payment sheet — just return to cart quietly, no error toast
    go("cart");
  } else {
    toast(res.error || t('toast_payment_fail'));
    go("cart");
  }
}

      });
    });
    $("#topupCustomInput").addEventListener("input", (e)=>{
      const v = parseInt(e.target.value, 10);
      if (v > 0) {
        selectedAmount = v;
        $("#sheet").querySelectorAll("[data-topup-preset]").forEach(c=>c.classList.remove("active"));
        updatePreview();
      }
    });
    $("#topupStarsBtn").addEventListener("click", ()=> handleTopUp("stars", selectedAmount));
    $("#topupCryptoBtn").addEventListener("click", ()=> handleTopUp("crypto", selectedAmount));
  }

  function updatePreview(){
    const preview = $("#topupAmountPreview");
    if (preview) preview.textContent = selectedAmount.toLocaleString('en-US');
    const box = preview ? preview.closest('.glass') : null;
    if (box) box.querySelector('span.mono').textContent = ` (≈ ${money(selectedAmount/RATES.STARS)})`;
  }
}

async function handleTopUp(method, amountStars){
  if (!amountStars || amountStars < 50) { toast(t('toast_topup_min')); return; }
  closeSheet();

  if (method === "stars") {
    if (isRealPaymentsAvailable()) {
      try{
        const tg = window.Telegram.WebApp;
        toast(t('topup_processing'));
        const res = await fetch(`${CONFIG.apiBaseUrl}/api/create-topup-invoice`, {
          method:"POST", headers:{"Content-Type":"application/json"},
          body: JSON.stringify({ initData: tg.initData, amountStars }),
        });
        if(!res.ok){ const e = await res.json().catch(()=>({})); throw new Error(e.error || `Server error (${res.status})`); }
        const { invoiceLink } = await res.json();
        const status = await new Promise(resolve => tg.openInvoice(invoiceLink, resolve));
        if (status === "paid") {
          STATE.starsBalance += amountStars;
          toast(t('toast_topup_confirmed'));
          render();
          refreshBalance();
        } else if (status !== "cancelled") {
          toast(t('toast_payment_fail'));
        }
      }catch(err){
        console.error("Stars top-up failed:", err);
        toast(err.message || t('toast_payment_fail'));
      }
    } else {
      // Preview / outside Telegram: simulate so the flow is still testable.
      toast(t('topup_processing'));
      await wait(1200);
      STATE.starsBalance += amountStars;
      toast(t('toast_topup_confirmed'));
      render();
    }
    return;
  }

  if (method === "crypto") {
    const amountUsd = amountStars / RATES.STARS;
    if (isRealPaymentsAvailable()) {
      try{
        const tg = window.Telegram.WebApp;
        toast(t('topup_processing'));
        const res = await fetch(`${CONFIG.apiBaseUrl}/api/create-topup-crypto`, {
          method:"POST", headers:{"Content-Type":"application/json"},
          body: JSON.stringify({ initData: tg.initData, amountUsd }),
        });
        if(!res.ok){ const e = await res.json().catch(()=>({})); throw new Error(e.error || `Server error (${res.status})`); }
        const { payLink } = await res.json();
        if (payLink.includes("t.me")) tg.openTelegramLink(payLink);
        else if (tg.openLink) tg.openLink(payLink);
        else window.open(payLink, "_blank");
        toast(t('topup_waiting_crypto'));
        pollBalanceForTopUp(STATE.starsBalance);
      }catch(err){
        console.error("Crypto top-up failed:", err);
        toast(err.message || t('toast_payment_fail'));
      }
    } else {
      // Preview / outside Telegram: simulate so the flow is still testable.
      toast(t('topup_processing'));
      await wait(1400);
      STATE.starsBalance += amountStars;
      toast(t('toast_topup_confirmed'));
      render();
    }
  }
}

// Crypto top-ups are confirmed async via webhook — poll briefly for the
// balance to change after the user returns from the external Wallet flow.
async function refreshBalance(){
  if (!isRealPaymentsAvailable()) return;
  try{
    const tg = window.Telegram.WebApp;
    const res = await fetch(`${CONFIG.apiBaseUrl}/api/balance?initData=${encodeURIComponent(tg.initData)}`);
    if(res.ok){ const data = await res.json(); STATE.starsBalance = data.balanceStars; render(); }
  }catch(e){}
}
async function pollBalanceForTopUp(initialBalance){
  if (!isRealPaymentsAvailable()) return;
  const tg = window.Telegram.WebApp;
  const deadline = Date.now() + 120000;
  while (Date.now() < deadline) {
    await wait(4000);
    try{
      const res = await fetch(`${CONFIG.apiBaseUrl}/api/balance?initData=${encodeURIComponent(tg.initData)}`);
      if(res.ok){
        const data = await res.json();
        if (data.balanceStars > initialBalance) {
          STATE.starsBalance = data.balanceStars;
          toast(t('toast_topup_confirmed'));
          render();
          return;
        }
      }
    }catch(e){}
  }
}

/* ---------------- admin sheets ---------------- */
function openEditGameSheet(id){
  const g = id ? GAMES.find(x=>x.id===id) : null;
  let pendingImage = g ? (g.imageUrl || null) : null;
  openSheet(`
    <h3 style="margin:0 0 16px;">${g?t('edit_game'):t('add_game')}</h3>
    <div class="field">
      <label>${t('image_l')}</label>
      <div id="imgPreviewWrap" style="width:100%; aspect-ratio:16/9; border-radius:14px; overflow:hidden; margin-bottom:10px; border:1px solid var(--border); ${pendingImage?`background-image:url('${pendingImage.replace(/'/g,"%27")}'); background-size:cover; background-position:center;`:`background:linear-gradient(150deg,hsl(${g?g.hue:220} 70% 22%),hsl(${g?g.hue2:290} 65% 14%)); display:flex; align-items:center; justify-content:center; color:var(--text-faint); font-size:11px;`}">
        ${pendingImage?'':t('no_image_yet')}
      </div>
      <div style="display:flex; gap:8px; align-items:center;">
        <input id="fImageUrl" placeholder="${t('image_url_ph')}" value="${pendingImage && !pendingImage.startsWith('data:')?pendingImage:''}" style="flex:1;">
      </div>
      <div style="display:flex; align-items:center; gap:8px; margin:10px 0;">
        <div style="flex:1; height:1px; background:var(--border);"></div>
        <span style="font-size:10.5px; color:var(--text-faint);">${t('image_or')}</span>
        <div style="flex:1; height:1px; background:var(--border);"></div>
      </div>
      <label class="btn btn-ghost btn-sm" style="width:100%; cursor:pointer;">
        ${t('image_upload_btn')}
        <input id="fImageFile" type="file" accept="image/*" style="display:none;">
      </label>
    </div>
    <div class="field"><label>${t('title_l')}</label><input id="fTitle" value="${g?g.title:''}"></div>
    <div class="field"><label>${t('genre_l')}</label>
      <select id="fGenre">${GENRES.map(gn=>`<option value="${gn}" ${g&&g.genre===gn?'selected':''}>${trGenre(gn)}</option>`).join("")}</select>
    </div>
    <div class="field"><label>${t('price_usd_l')}</label><input id="fPrice" type="number" step="0.01" value="${g?g.price:'1.49'}"></div>
    <div class="field"><label>${t('desc_l')}</label><textarea id="fDesc">${g?g.desc:''}</textarea></div>
    <button class="btn btn-primary" id="saveGameBtn">${g?t('save_changes'):t('add_game')}</button>
  `);

  function updatePreview(url){
    const wrap = $("#imgPreviewWrap");
    if (url) {
      wrap.style.backgroundImage = `url('${url.replace(/'/g,"%27")}')`;
      wrap.style.backgroundSize = "cover";
      wrap.style.backgroundPosition = "center";
      wrap.style.display = "block";
      wrap.textContent = "";
    } else {
      wrap.style.backgroundImage = "none";
      wrap.style.display = "flex";
      wrap.textContent = t('no_image_yet');
    }
  }
  $("#fImageUrl").addEventListener("input", (e)=>{
    pendingImage = e.target.value.trim() || null;
    updatePreview(pendingImage);
  });
  $("#fImageFile").addEventListener("change", (e)=>{
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ()=>{
      pendingImage = reader.result; // base64 data URL, stored fully client-side
      $("#fImageUrl").value = "";
      updatePreview(pendingImage);
    };
    reader.readAsDataURL(file);
  });

  $("#saveGameBtn").addEventListener("click", ()=>{
    const title = $("#fTitle").value.trim();
    const genre = $("#fGenre").value;
    const price = parseFloat($("#fPrice").value)||0.99;
    const desc = $("#fDesc").value.trim();
    if(!title){ toast(t('toast_title_required')); return; }
    if (g) { g.title=title; g.genre=genre; g.price=price; g.desc=desc; g.imageUrl=pendingImage; toast(t('toast_game_updated')); }
    else {
      GAMES.push({ id:"g"+(GAMES.length+1)+"_"+Date.now(), title, genre, price, orig:null, discountPct:0, desc, rating:4.5, isNew:true, isHot:false, hue:Math.floor(rnd()*360), hue2:Math.floor(rnd()*360), sold:0, imageUrl:pendingImage });
      toast(t('toast_game_added'));
    }
    closeSheet(); render();
  });
}

STATE.user = auth.telegramLogin();
render();
refreshBalance(); // no-op in preview/demo mode; pulls the real balance when backend is live
</script>
